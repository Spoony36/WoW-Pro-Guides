name: LuaCheck

on:
  push:
    paths:
      - '**.lua'
  pull_request:
    paths:
      - '**.lua'

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"
      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4
      - name: Install luacheck
        run: luarocks install luacheck
      - name: Run luacheck
        run: luacheck WoWPro --no-color --codes --globals WoWPro WoWProDB WoWProCharDB _G --no-warnings
